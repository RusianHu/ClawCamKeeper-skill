<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawCamKeeper - 工位摸鱼防护预警</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --border-color: #2a2a3a;
            --text-primary: #e0e0e8;
            --text-secondary: #8888a0;
            --accent-green: #00ff88;
            --accent-red: #ff3355;
            --accent-yellow: #ffaa00;
            --accent-blue: #4488ff;
            --glow-green: 0 0 20px rgba(0, 255, 136, 0.3);
            --glow-red: 0 0 20px rgba(255, 51, 85, 0.3);
            --glow-yellow: 0 0 20px rgba(255, 170, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 1000;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: var(--text-primary);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .logo .icon { margin-right: 10px; }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
            opacity: 0.5;
        }

        .card.danger::before {
            background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
        }

        .card.warning::before {
            background: linear-gradient(90deg, transparent, var(--accent-yellow), transparent);
        }

        .card-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* 状态指示器 */
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .status-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--border-color);
            background: var(--bg-secondary);
            transition: all 0.3s ease;
        }

        .status-circle .icon { font-size: 2.5rem; margin-bottom: 5px; }
        .status-circle .label { font-size: 0.8rem; color: var(--text-secondary); }

        .status-circle.unarmed { border-color: var(--text-secondary); }
        .status-circle.armed { 
            border-color: var(--accent-green); 
            box-shadow: var(--glow-green);
        }
        .status-circle.danger_locked { 
            border-color: var(--accent-red); 
            box-shadow: var(--glow-red);
            animation: pulse-red 1.5s ease-in-out infinite;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 51, 85, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 51, 85, 0.6); }
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn.arm { border-color: var(--accent-green); color: var(--accent-green); }
        .btn.arm:hover { background: rgba(0, 255, 136, 0.1); box-shadow: var(--glow-green); }

        .btn.disarm { border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .btn.disarm:hover { background: rgba(255, 170, 0, 0.1); }

        .btn.recover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .btn.recover:hover { background: rgba(68, 136, 255, 0.1); }

        /* 视频流 */
        .video-container {
            position: relative;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--accent-green);
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }

        .rec-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-red);
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 信息列表 */
        .info-list { list-style: none; }
        .info-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }
        .info-list li:last-child { border-bottom: none; }
        .info-list .label { color: var(--text-secondary); }
        .info-list .value { color: var(--text-primary); }
        .info-list .value.yes { color: var(--accent-green); }
        .info-list .value.no { color: var(--accent-red); }

        /* 事件列表 */
        .events-container {
            max-height: 300px;
            overflow-y: auto;
        }

        .event-item {
            padding: 10px;
            border-left: 2px solid var(--border-color);
            margin-bottom: 8px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.02);
        }

        .event-item .time { color: var(--text-secondary); font-size: 0.7rem; }
        .event-item .type { color: var(--accent-blue); margin: 0 5px; }
        .event-item .msg { color: var(--text-primary); }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 6px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            z-index: 100;
            transform: translateX(120%);
            max-width: 350px;
        }

        .notification.success { border-color: var(--accent-green); }
        .notification.error { border-color: var(--accent-red); }
        .notification.warning { border-color: var(--accent-yellow); }

        /* 武装动画 */
        .arming-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
        }

        .arming-content {
            text-align: center;
        }

        .arming-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            margin: 0 auto 20px;
        }

        .arming-text {
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--accent-green);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="arming-overlay" id="armingOverlay">
        <div class="arming-content">
            <div class="arming-spinner" id="armingSpinner"></div>
            <div class="arming-text" id="armingText">ARMING...</div>
        </div>
    </div>

    <div class="notification" id="notification">
        <span id="notificationText"></span>
    </div>

    <div class="container">
        <header>
            <div class="logo"><span class="icon">🛡️</span>CLAWCAMKEEPER</div>
            <div class="subtitle">工位摸鱼防护预警系统 v0.1.0</div>
        </header>

        <div class="main-grid">
            <!-- 状态卡片 -->
            <div class="card" id="statusCard">
                <div class="card-title">系统状态</div>
                <div class="status-indicator">
                    <div class="status-circle unarmed" id="statusCircle">
                        <span class="icon" id="statusIcon">⚪</span>
                        <span class="label" id="statusLabel">未武装</span>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn arm" id="armBtn" onclick="armSystem()">🔒 武装</button>
                    <button class="btn disarm" id="disarmBtn" onclick="disarmSystem()">🔓 解除</button>
                    <button class="btn recover" id="recoverBtn" onclick="recoverSystem()">🔄 恢复</button>
                </div>
            </div>

            <!-- 视频流卡片 -->
            <div class="card" id="videoCard">
                <div class="card-title">实时监控</div>
                <div class="video-container">
                    <img id="videoStream" src="/api/frame" alt="监控画面">
                    <div class="video-overlay">
                        <span>CAM-01</span>
                        <span class="rec-indicator" id="recIndicator" style="display:none">
                            <span class="rec-dot"></span>
                            <span>REC</span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- 系统信息卡片 -->
            <div class="card" id="infoCard">
                <div class="card-title">系统信息</div>
                <ul class="info-list" id="infoList">
                    <li><span class="label">武装状态</span><span class="value" id="infoArmState">-</span></li>
                    <li><span class="label">报警阶段</span><span class="value" id="infoAlertPhase">-</span></li>
                    <li><span class="label">摄像头</span><span class="value" id="infoCamera">-</span></li>
                    <li><span class="label">安全窗口</span><span class="value" id="infoSafeWindow">-</span></li>
                    <li><span class="label">动作链路</span><span class="value" id="infoActionChain">-</span></li>
                    <li><span class="label">最后事件</span><span class="value" id="infoLastEvent">-</span></li>
                </ul>
            </div>

            <!-- 事件记录卡片 -->
            <div class="card" id="eventsCard">
                <div class="card-title">事件记录</div>
                <div class="events-container" id="eventsList">
                    <div style="color: var(--text-secondary); text-align: center; padding: 20px;">
                        暂无事件记录
                    </div>
                </div>
            </div>
        </div>

        <footer>
            ClawCamKeeper-skill | 本地优先 · 双阶段策略 · 摸鱼防护
        </footer>
    </div>

    <script>
        // 状态映射
        const STATE_CONFIG = {
            unarmed: { icon: '⚪', label: '未武装', class: 'unarmed' },
            armed: { icon: '🟢', label: '已武装', class: 'armed' },
            danger_locked: { icon: '🔴', label: '危险锁定', class: 'danger_locked' }
        };

        const ALERT_CONFIG = {
            none: '无',
            pre_alert: '⚠️ 无感预备',
            full_alert: '🚨 完全报警'
        };

        let currentState = null;
        let pollInterval = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 入场动画
            gsap.from('header', { opacity: 0, y: -20, duration: 0.6, ease: 'power2.out' });
            gsap.from('.card', { 
                opacity: 0, 
                y: 30, 
                duration: 0.5, 
                stagger: 0.1, 
                ease: 'power2.out',
                delay: 0.3
            });

            // 开始轮询
            startPolling();
        });

        function startPolling() {
            updateStatus();
            updateEvents();
            pollInterval = setInterval(() => {
                updateStatus();
            }, 1000);
            // 事件更新频率低一些
            setInterval(updateEvents, 3000);
        }

        async function updateStatus() {
            try {
                const resp = await fetch('/api/status');
                if (!resp.ok) return;
                const data = await resp.json();
                renderStatus(data);
            } catch (e) {
                console.error('状态更新失败:', e);
            }
        }

        async function updateEvents() {
            try {
                const resp = await fetch('/api/events?limit=10');
                if (!resp.ok) return;
                const data = await resp.json();
                renderEvents(data.events || []);
            } catch (e) {
                console.error('事件更新失败:', e);
            }
        }

        function renderStatus(data) {
            const armState = data.arm_state;
            const config = STATE_CONFIG[armState] || STATE_CONFIG.unarmed;
            
            // 更新状态圆环
            const circle = document.getElementById('statusCircle');
            const icon = document.getElementById('statusIcon');
            const label = document.getElementById('statusLabel');
            
            circle.className = 'status-circle ' + config.class;
            icon.textContent = config.icon;
            label.textContent = config.label;

            // 状态变化动画
            if (currentState !== armState) {
                if (currentState) {
                    gsap.fromTo(circle, 
                        { scale: 0.8, opacity: 0.5 },
                        { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(1.7)' }
                    );
                }
                currentState = armState;
            }

            // 更新按钮状态
            document.getElementById('armBtn').disabled = armState === 'armed';
            document.getElementById('disarmBtn').disabled = armState === 'unarmed';
            document.getElementById('recoverBtn').disabled = armState !== 'danger_locked';

            // 更新 REC 指示器
            const recIndicator = document.getElementById('recIndicator');
            recIndicator.style.display = armState === 'armed' ? 'flex' : 'none';

            // 更新信息列表
            document.getElementById('infoArmState').textContent = config.label;
            document.getElementById('infoArmState').className = 'value ' + (armState === 'armed' ? 'yes' : '');
            
            document.getElementById('infoAlertPhase').textContent = ALERT_CONFIG[data.alert_phase] || '无';
            document.getElementById('infoCamera').textContent = data.camera_available ? '✅ 可用' : '❌ 不可用';
            document.getElementById('infoCamera').className = 'value ' + (data.camera_available ? 'yes' : 'no');
            document.getElementById('infoSafeWindow').textContent = data.safe_window_available ? '✅ 可用' : '❌ 不可用';
            document.getElementById('infoSafeWindow').className = 'value ' + (data.safe_window_available ? 'yes' : 'no');
            document.getElementById('infoActionChain').textContent = data.action_chain_available ? '✅ 可用' : '❌ 不可用';
            document.getElementById('infoActionChain').className = 'value ' + (data.action_chain_available ? 'yes' : 'no');
            document.getElementById('infoLastEvent').textContent = data.last_event_message || '-';

            // 更新视频流
            const videoStream = document.getElementById('videoStream');
            if (armState === 'armed') {
                videoStream.src = '/api/stream';
            } else {
                videoStream.src = '/api/frame';
            }

            // 卡片样式根据状态变化
            const statusCard = document.getElementById('statusCard');
            statusCard.className = 'card' + (armState === 'danger_locked' ? ' danger' : armState === 'armed' ? '' : '');
        }

        function renderEvents(events) {
            const container = document.getElementById('eventsList');
            if (!events.length) {
                container.innerHTML = '<div style="color: var(--text-secondary); text-align: center; padding: 20px;">暂无事件记录</div>';
                return;
            }

            container.innerHTML = events.map(event => {
                const time = event.timestamp?.substring(11, 19) || '';
                return `<div class="event-item">
                    <span class="time">${time}</span>
                    <span class="type">[${event.event_type}]</span>
                    <span class="msg">${event.message}</span>
                </div>`;
            }).join('');

            // 新事件入场动画
            gsap.from('.event-item', { 
                opacity: 0, 
                x: -20, 
                duration: 0.3, 
                stagger: 0.05,
                ease: 'power2.out' 
            });
        }

        async function armSystem() {
            showArmingAnimation();
            try {
                const resp = await fetch('/api/arm', { method: 'POST' });
                const data = await resp.json();
                hideArmingAnimation();
                if (resp.ok) {
                    showNotification(data.message, 'success');
                } else {
                    showNotification(data.error, 'error');
                }
            } catch (e) {
                hideArmingAnimation();
                showNotification('请求失败: ' + e.message, 'error');
            }
        }

        async function disarmSystem() {
            try {
                const resp = await fetch('/api/disarm', { method: 'POST' });
                const data = await resp.json();
                if (resp.ok) {
                    showNotification(data.message, 'success');
                } else {
                    showNotification(data.error, 'error');
                }
            } catch (e) {
                showNotification('请求失败: ' + e.message, 'error');
            }
        }

        async function recoverSystem() {
            try {
                const resp = await fetch('/api/recover', { method: 'POST' });
                const data = await resp.json();
                if (resp.ok) {
                    showNotification(data.message, 'success');
                } else {
                    showNotification(data.error, 'error');
                }
            } catch (e) {
                showNotification('请求失败: ' + e.message, 'error');
            }
        }

        function showArmingAnimation() {
            const overlay = document.getElementById('armingOverlay');
            overlay.style.pointerEvents = 'auto';
            gsap.to(overlay, { opacity: 1, duration: 0.3 });
            gsap.fromTo('#armingSpinner', 
                { rotation: 0 },
                { rotation: 360, duration: 1, repeat: -1, ease: 'none' }
            );
        }

        function hideArmingAnimation() {
            const overlay = document.getElementById('armingOverlay');
            gsap.to(overlay, { 
                opacity: 0, 
                duration: 0.3, 
                onComplete: () => { overlay.style.pointerEvents = 'none'; }
            });
        }

        function showNotification(message, type = 'success') {
            const notif = document.getElementById('notification');
            const text = document.getElementById('notificationText');
            text.textContent = message;
            notif.className = 'notification ' + type;
            
            gsap.to(notif, { x: 0, duration: 0.4, ease: 'back.out(1.7)' });
            
            setTimeout(() => {
                gsap.to(notif, { x: '120%', duration: 0.3, ease: 'power2.in' });
            }, 3000);
        }
    </script>
</body>
</html>
