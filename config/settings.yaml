camera:
  device_index: 0
  fps: 30
  frame_height: 480
  frame_width: 640
  startup_warmup_ms: 700
  quick_probe_retries: 3
  quick_probe_retry_delay_ms: 450
  quick_check_max_ms: 3200
  quick_probe_open_budget_ratio: 0.8
  quick_probe_frame_budget_ms: 180
detection:
  confidence_threshold: 0.5
  full_alert_frames: 30
  pre_alert_frames: 10
  risk_zone:
    height: 1.0
    width: 1.0
    x: 0.0
    y: 0.0
logging:
  file: clawcamkeeper.log
  level: INFO
risk_apps:
- chrome.exe
- msedge.exe
- firefox.exe
- code.exe
- WeChat.exe
- QQ.exe
safe_window:
  backup: calc.exe
  primary: Weixin.exe
webui:
  allow_lan: false
  debug: false
  host: 127.0.0.1
  port: 8765
openclaw:
  notifications:
    enabled: true
    command: openclaw
    timeout_seconds: 8
    context_ttl_seconds: 900
    message_prefix: '[ClawCamKeeper]'
    routes:
      qqbot:
        target: qqbot:c2c:BBD5BE9523E5F99487345D9CADECEC2B
        account: default
      feishu:
        target: user:ou_82340de4b504d3fafb6c71e5167669bf
        account: default
    fallback:
      channel: qqbot
      target: qqbot:c2c:BBD5BE9523E5F99487345D9CADECEC2B
      account: default
